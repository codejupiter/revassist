name: Bug report
description: Report a reproducible issue in RevAssist or RevAssist Pro.
title: "fix: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is broken?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the shortest path to reproduce the issue.
      placeholder: |
        1. Open ...
        2. Click ...
        3. See ...
    validations:
      required: true
  - type: dropdown
    id: surface
    attributes:
      label: Surface
      options:
        - Browser demo
        - RevAssist Pro
        - Documentation
        - CI/deployment
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: validation
    attributes:
      label: Validation notes
      description: Include logs, screenshots, or failed commands when useful. Do not include secrets or real customer data.
